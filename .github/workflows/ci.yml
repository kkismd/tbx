name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main, issue/470-sttr1-porting, integration/**]

env:
    CARGO_TERM_COLOR: always
    RUSTFLAGS: -Dwarnings

jobs:
    current-check:
        name: Current / Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
            - uses: Swatinem/rust-cache@v2
            - run: cargo check -p tbx --all-targets

    current-test:
        name: Current / Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
            - uses: Swatinem/rust-cache@v2
            - run: cargo test -p tbx

    next-check:
        name: Next / Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
            - uses: Swatinem/rust-cache@v2
            - run: cargo check -p tbx-next --all-targets

    next-test:
        name: Next / Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
            - uses: Swatinem/rust-cache@v2
            - run: cargo test -p tbx-next

    clippy:
        name: Workspace / Clippy
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  components: clippy
            - uses: Swatinem/rust-cache@v2
            - run: cargo clippy --workspace --all-targets

    fmt:
        name: Workspace / Format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  components: rustfmt
            - run: cargo fmt --all --check
