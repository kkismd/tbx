name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main, issue/470-sttr1-porting, integration/**]

env:
    CARGO_TERM_COLOR: always
    RUSTFLAGS: -Dwarnings

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
            - uses: Swatinem/rust-cache@v2
            - run: cargo check --workspace --all-targets

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
            - uses: Swatinem/rust-cache@v2
            - run: cargo test --workspace

    clippy:
        name: Clippy
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  components: clippy
            - uses: Swatinem/rust-cache@v2
            - run: cargo clippy --workspace --all-targets

    fmt:
        name: Format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  components: rustfmt
            - run: cargo fmt --all --check
